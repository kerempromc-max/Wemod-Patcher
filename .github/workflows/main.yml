üname: Build WeMod Patcher

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4.2.2
      with:
        submodules: recursive

    # Renames library.c to library.cpp and updates CMakeLists.txt on the fly.
    # This prevents MSVC's pure C compiler from failing on C++ keywords (like extern "C").
    - name: Rename Source to C++ for MSVC Compliance
      shell: pwsh
      run: |
        $libPath = "tools/asar-fuses-bypass/library.c"
        $cppPath = "tools/asar-fuses-bypass/library.cpp"
        $cmakePath = "tools/asar-fuses-bypass/CMakeLists.txt"
        
        if (Test-Path $libPath) {
            Write-Host "Renaming library.c to library.cpp..."
            Rename-Item -Path $libPath -NewName "library.cpp" -Force
            
            Write-Host "Updating CMakeLists.txt to reference library.cpp..."
            (Get-Content $cmakePath) -replace 'library.c', 'library.cpp' | Set-Content $cmakePath
        } else {
            Write-Host "library.c not found or already renamed. Skipping."
        }

    - name: Configure CMake for Proxy DLL
      run: |
        cmake -S tools/asar-fuses-bypass -B tools/asar-fuses-bypass/cmake-build-release -DCMAKE_BUILD_TYPE=Release

    - name: Build Proxy DLL with CMake
      run: |
        cmake --build tools/asar-fuses-bypass/cmake-build-release --config Release

    # Targets the exact compiler output path directly, keeping a narrow fallback scan just in case.
    - name: Locate and Copy Proxy DLL
      shell: pwsh
      run: |
        $destDir = "$env:GITHUB_WORKSPACE/tools/asar-fuses-bypass/cmake-build-release"
        New-Item -ItemType Directory -Force -Path $destDir
        
        # Look specifically in the Release output folder of the CMake build
        $compiledDll = "tools/asar-fuses-bypass/cmake-build-release/Release/version.dll"
        if (-not (Test-Path $compiledDll)) {
            # Fallback search if a different generator or subfolder structure was used
            $compiledDll = Get-ChildItem -Path "tools/asar-fuses-bypass/cmake-build-release" -Filter "version.dll" -Recurse | Select-Object -First 1 | ForEach-Object { $_.FullName }
        }
        
        if ($compiledDll -and (Test-Path $compiledDll)) {
            Write-Host "Found compiled DLL at: $compiledDll"
            Copy-Item -Path $compiledDll -Destination "$destDir/version.dll" -Force
            Write-Host "Successfully copied to target directory: $destDir/version.dll"
        } else {
            Write-Error "Could not find the compiled version.dll! Ensure the CMake build succeeded."
            exit 1
        }

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v3

    - name: Restore NuGet Packages
      run: nuget restore Wemod-Patcher.sln

    - name: Build Solution
      run: msbuild Wemod-Patcher.sln /p:Configuration=Release

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WeMod-Patcher-Build
        path: |
          **/bin/Release/**/*.exe
          **/bin/Release/**/*.dll
