name: Build WeMod Patcher

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4.2.2
      with:
        submodules: recursive

    # Added -DCMAKE_C_FLAGS="/TP" to force MSVC to compile library.c as C++
    - name: Configure CMake for Proxy DLL
      run: |
        cmake -S tools/asar-fuses-bypass -B tools/asar-fuses-bypass/cmake-build-release -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS="/TP"

    - name: Build Proxy DLL with CMake
      run: cmake --build tools/asar-fuses-bypass/cmake-build-release --config Release

    - name: Force Locate and Copy Proxy DLL
      shell: pwsh
      run: |
        $destDir = "$env:GITHUB_WORKSPACE/tools/asar-fuses-bypass/cmake-build-release"
        New-Item -ItemType Directory -Force -Path $destDir
        
        $dll = Get-ChildItem -Path "$env:GITHUB_WORKSPACE/tools/asar-fuses-bypass" -Filter "*.dll" -Recurse | Where-Object { $_.FullName -notlike "*cmake-build-release/version.dll" } | Select-Object -First 1
        
        if ($dll) {
            Write-Host "Found compiled DLL at: $($dll.FullName)"
            Copy-Item -Path $dll.FullName -Destination "$destDir/version.dll" -Force
            Write-Host "Successfully copied and renamed to: $destDir/version.dll"
        } else {
            Write-Error "Could not find any compiled DLL! The CMake build may have failed silently."
            exit 1
        }

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v4

    - name: Restore NuGet Packages
      run: nuget restore Wemod-Patcher.sln

    - name: Build Solution
      run: msbuild Wemod-Patcher.sln /p:Configuration=Release

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WeMod-Patcher-Build
        path: |
          **/bin/Release/**/*.exe
          **/bin/Release/**/*.dll
